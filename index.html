// ===== Custom Resize Logic =====
(function waitForStage() {
  if (typeof stage === 'undefined' || !stage) {
    setTimeout(waitForStage, 50);
    return;
  }
  var safeW = 1550,
      safeH = 835,
      safeX = 120,
      safeY = 190,
      canvasEl       = document.getElementById('canvas'),
      animContainer  = document.getElementById('animation_container'),
      domOverlay     = document.getElementById('dom_overlay_container');
  function resizeCanvas() {
    var iw     = window.innerWidth,
        ih     = window.innerHeight,
        pRatio = window.devicePixelRatio || 1,
        sRatio = Math.min(iw / safeW, ih / safeH);
	  var scaledCanvasW = 1800 * sRatio;
var scaledCanvasH = 1200 * sRatio;
// بس لو landscape
if (iw > ih) {
    if (scaledCanvasW < iw) sRatio = sRatio * (iw / scaledCanvasW);
    if (scaledCanvasH < ih) sRatio = sRatio * (ih / scaledCanvasH);
}
sRatio = sRatio * 1.005; // زيادة صغيرة جداً تغطي الكسور
    canvasEl.width  = iw * pRatio;
    canvasEl.height = ih * pRatio;
    canvasEl.style.width  = iw + 'px';
    canvasEl.style.height = ih + 'px';
    if (animContainer) {
      animContainer.style.width  = iw + 'px';
      animContainer.style.height = ih + 'px';
    }
    if (domOverlay) {
      domOverlay.style.width  = iw + 'px';
      domOverlay.style.height = ih + 'px';
    }
    stage.scaleX = stage.scaleY = sRatio * pRatio;
    stage.x = (iw * pRatio - safeW * sRatio * pRatio) / 2
              - (safeX * sRatio * pRatio);
    stage.y = (ih * pRatio - safeH * sRatio * pRatio) / 2
              - (safeY * sRatio * pRatio);
    stage.tickOnUpdate = false;
///////////
// الجزء الظاهر بيبدأ من 0,0 على الشاشة دايماً
// محتاجة تحولي الـ screen (0,0) لـ canvas coordinates
var visibleOriginX = -stage.x / (sRatio * pRatio);
var visibleOriginY = -stage.y / (sRatio * pRatio);
// لو stage.y موجب يعني الكانفاس نازل، فالـ visible top = 0 في الكانفاس مش فوقه
visibleOriginX = Math.max(0, visibleOriginX);
visibleOriginY = Math.max(0, visibleOriginY);
if (exportRoot.logo_mc) {
    exportRoot.logo_mc.x = visibleOriginX + 30;
    exportRoot.logo_mc.y = visibleOriginY + 30;
}
////////////
    stage.update();
    stage.tickOnUpdate = true;
  }
  // Remove any existing resize listener to avoid duplicates
  window.removeEventListener('resize', window._animResize);
  window._animResize = resizeCanvas;
  window.addEventListener('resize', window._animResize);
  resizeCanvas();
})();

function loadImageIntoBox(dragBox, path){
  const txt = dragBox.getChildByName("drag_txt");
  const dragShape = dragBox.drag1;
  const b = dragShape.nominalBounds 
  dragShape.removeAllChildren();
  if(path){
    const img = new Image();
    img.onload = function(){
      const bmp = new createjs.Bitmap(img);
      // ⭐ نفس حجم الدراج بالظبط
      bmp.scaleX = b.width  / img.width;
      bmp.scaleY = b.height / img.height;
      bmp.x = 0;
      bmp.y = 0;
      // ⭐ إنشاء mask بزوايا دائرية
      dragShape.addChild(bmp);
      stage.update();
    };
    img.src = path;
  }
}
function loadImageIntoMC(dragBox, path){
  const dragShape = dragBox.getChildAt(0);
  const b = dragShape.nominalBounds || {width:100,height:120};
  dragShape.removeAllChildren();
  if(path){
	 const img = new Image();
    img.onload = function(){
      const bmp = new createjs.Bitmap(img);
      // ⭐ نفس حجم الدراج بالظبط
      bmp.scaleX = b.width  / img.width;
      bmp.scaleY = b.height / img.height;
      bmp.x = 0;
      bmp.y = 0;
      dragShape.addChild(bmp);
      stage.update();
    };
    img.src = path;
  }
}

<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("A3AEFBB9882AC04B82D2EC07A0D9EEBE");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	var preloaderDiv = document.getElementById("_preload_div_");
	preloaderDiv.style.display = 'none';
	canvas.style.display = 'block';
	exportRoot = new lib.index();
	stage = new lib.Stage(canvas);
	stage.enableMouseOver();	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,preloaderDiv,anim_container,dom_overlay_container]);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}
</script>
